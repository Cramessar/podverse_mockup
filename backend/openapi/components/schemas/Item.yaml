type: object
required:
  - id
  - id_text
  - channel_id
  - title
  - item_flag_status_id
properties:
  id:
    type: integer
    description: Unique identifier for the item
    example: 1

  id_text:
    type: string
    maxLength: 64
    description: Short identifier used in public-facing URLs
    example: "ep_2a3f9c"

  slug:
    type: string
    maxLength: 100
    nullable: true
    description: URL-friendly slug for the item
    example: "episode-1-getting-started"

  channel_id:
    type: integer
    description: ID of the channel this item belongs to
    example: 42

  guid:
    type: string
    maxLength: 2083
    nullable: true
    description: RSS `<guid>` of the item (either guid or guid_enclosure_url must be present)
    example: "https://example.com/items/1"

  guid_enclosure_url:
    type: string
    maxLength: 2083
    nullable: true
    description: Enclosure URL from RSS used as fallback if GUID is missing (either guid or guid_enclosure_url must be present)
    example: "https://example.com/items/ep1.mp3"

  pub_date:
    type: string
    format: date-time
    nullable: true
    description: Publication date of the item
    example: "2024-01-15T10:30:00Z"

  title:
    type: string
    maxLength: 255
    description: Title of the item (usually the episode title)
    example: "Episode 1: Getting Started"

  item_flag_status_id:
    type: integer
    description: Foreign key to the item_flag_status table
    example: 1

  flag_status:
    $ref: "./ItemFlagStatus.yaml"

  stats:
    $ref: "./StatsAggregatedItem.yaml"

  events:
    type: array
    items:
      $ref: "./StatsTrackEventItem.yaml"
    description: Item tracking events