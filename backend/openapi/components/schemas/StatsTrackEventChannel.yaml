type: object
properties:
  id:
    type: integer
    description: Unique identifier for the channel tracking event
    example: 1
  
  account_guid:
    type: string
    maxLength: 15
    description: Account GUID that triggered the event
    example: "abc123def456"
  
  channel_id:
    type: integer
    description: Foreign key reference to channel table
    example: 123
  
  created_at:
    type: string
    format: date-time
    description: Timestamp when the event was tracked
    example: "2024-01-01T10:00:00Z"

required:
  - id
  - account_guid
  - channel_id
  - created_at 