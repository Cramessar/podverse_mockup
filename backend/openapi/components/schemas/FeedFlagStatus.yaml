
type: object
properties:
  id:
    type: integer
    description: Unique identifier
    example: 1

  status:
    type: string
    enum: [active, always-parse, spam, pending-archive, archived, takedown]
    description: Status assigned to the feed
    example: "active"

  created_at:
    type: string
    format: date-time
    description: Timestamp of creation
    example: "2024-01-01T10:00:00Z"

  updated_at:
    type: string
    format: date-time
    description: Timestamp of last update
    example: "2024-01-02T10:00:00Z"
