/channels:
  get:
    summary: Retrieve a list of channels
    description: |
      Returns a paginated list of channels with their basic metadata.
      Supports filtering by text-based search on `title`, and sorting by `id` or `title`.
      Primary table is `channel`.
      Related tables are :
      - `medium`: used to include the medium type (e.g. podcast, video) 
      - `feed`: used to show the associated RSS feed URL or status (optional).
    tags:
      - Channels
    security:
      - Auth0Bearer: []
    parameters:
      - $ref: "../components/parameters/query/limit.yaml"
      - $ref: "../components/parameters/query/offset.yaml"
      - $ref: "../components/parameters/query/search.yaml"
      - name: sort_by
        in: query
        schema:
          type: string
        description: |
          Field to sort results by. Supported fields: `id`, `title`. 
          Invalid values will gracefully fall back to `id` (default behavior).
      - name: sort_order
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
        description: Sort order (ascending or descending).
    responses:
      '200':
        description: List of channels returned
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: "../components/schemas/Channel.yaml"
                meta:
                  type: object
                  properties:
                    total:
                      type: integer
                      description: Total number of matching channels
                    limit:
                      type: integer
                      description: Limit applied to query
                    offset:
                      type: integer
                      description: Offset applied to query
      '400':
        description: Invalid request parameters
        content:
          application/json:
            schema:
              $ref: "../components/schemas/Error.yaml"
      '401':
        $ref: "../components/responses/Unauthorized.yaml"

/channels/{id}:
  get:
    summary: Retrieve a channel by ID
    description: |
      Returns details for a specific channel.
      Includes associated relationships and metadata such as slug, podcast index ID, feed reference, and medium.
      Primary table is `channel`.
      Related tables are :
      - `feed`: provides the associated feed URL and parsing status
      - `medium`: provides the media type of the channel
      - `channel_category` + `category`: maps the channel to its categories
      - `stats_aggregated_channel`: optionally used to show precomputed statistics
    tags:
      - Channels
    security:
      - Auth0Bearer: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
        description: The ID of the channel to retrieve
    responses:
      '200':
        description: Channel details
        content:
          application/json:
            schema:
              $ref: "../components/schemas/Channel.yaml"
      '400':
        $ref: "../components/responses/BadRequest.yaml"
      '401':
        $ref: "../components/responses/Unauthorized.yaml"
      '404':
        $ref: "../components/responses/NotFound.yaml"
      '500':
        $ref: "../components/responses/InternalServerError.yaml"

/channels/export:
  get:
    summary: Export channel data in CSV or JSON format
    description: |
      Exports channel data in CSV or JSON format. The export includes:
      
      - Basic channel info (id, title, slug, sortable_title, id_text)
      - Feed information (URL, status)
      - Medium type and name
      - Podcast metadata (podcast_index_id, podcast_guid, value flags)
      - Statistics (aggregated counts)
      - Timestamps (created_at, updated_at)
      
      This endpoint is useful for:
      - Analytics and reporting
      - Channel auditing and management
      - Data backup and migration
      - Integration with external systems
      
      The endpoint supports the same filtering and sorting options as the 
      main channels list endpoint for consistency.
      
      **Note**: OPML format is not supported for channel exports (only available for feeds).
    tags:
      - Channels
    security:
      - Auth0Bearer: []
    parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum: [csv, json]
          default: csv
        description: Export format - CSV for spreadsheet compatibility or JSON for API integration
      - $ref: "../components/parameters/query/search.yaml"
      - name: sort_by
        in: query
        schema:
          type: string
        description: |
          Field to sort results by. Supported fields: `id`, `title`. 
          Invalid values will gracefully fall back to `id` (default behavior).
      - name: sort_order
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: asc
        description: Sort order (ascending or descending)
      - name: max_rows
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 50000
          default: 10000
        description: |
          Maximum number of rows to export (for performance). 
          Valid range: 1-50000. Values outside this range will fall back to 10000 (default).
    responses:
      '200':
        description: Channel data exported successfully
        content:
          text/csv:
            schema:
              type: string
              format: binary
              description: CSV file containing channel data with timestamped filename
            example: |
              "id","title","slug","feed_url","medium_name","stats_all_time_count"
              "1","Tech Podcast","tech-podcast","https://example.com/feed.xml","podcast","1500"
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  slug:
                    type: string
                  feed_url:
                    type: string
                  medium_name:
                    type: string
                  stats_all_time_count:
                    type: integer
                description: JSON array of channel objects with complete metadata
        headers:
          Content-Disposition:
            schema:
              type: string
              example: "attachment; filename=channels_export_20240101_120000.csv"
            description: Specifies the filename for download (when format=csv)
      '400':
        description: Invalid request parameters or unsupported format
        content:
          application/json:
            schema:
              $ref: "../components/schemas/Error.yaml"
            examples:
              unsupported_format:
                summary: Unsupported format requested
                value:
                  error:
                    message: "OPML format is only supported for feeds. Use 'csv' or 'json' for other data types."
                    status_code: 400
      '401':
        $ref: "../components/responses/Unauthorized.yaml"
      '429':
        description: Rate limit exceeded
        content:
          application/json:
            schema:
              $ref: "../components/schemas/Error.yaml"
      '500':
        $ref: "../components/responses/InternalServerError.yaml"
