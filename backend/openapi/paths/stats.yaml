/stats/channels:
  get:
    summary: Retrieve aggregated channel statistics
    description: |
      Returns aggregated stats for channels such as total listens or views.
      Sorted by highest monthly count (month_current_count DESC).
      Supports optional filtering by time window (daily, weekly, monthly) and search by channel title or ID.
      Data is sourced from the `channel` and `stats_aggregated_channel` tables.
    tags:
      - Statistics
    security:
      - Auth0Bearer: []
    parameters:
      - $ref: "../components/parameters/query/time_filter.yaml"
      - $ref: "../components/parameters/query/limit.yaml"
      - $ref: "../components/parameters/query/offset.yaml"
      - $ref: "../components/parameters/query/search.yaml"
    responses:
      '200':
        description: Aggregated channel statistics returned
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: "../components/schemas/StatsChannel.yaml"
                meta:
                  type: object
                  properties:
                    total:
                      type: integer
                    limit:
                      type: integer
      '401':
        $ref: "../components/responses/Unauthorized.yaml"
      '500':
        $ref: "../components/responses/InternalServerError.yaml"

/stats/channels/{id}:
  get:
    summary: Retrieve detail stats for a specific channel
    description: |
      Returns detailed statistics, such as total listens or views, and metadata for a specific channel.
      Includes basic channel info, aggregated stats, and raw event count within an optional time window.
      Data comes from `stats_aggregated_channel` and `channel` tables.
    tags:
      - Statistics
    security:
      - Auth0Bearer: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: start
        in: query
        required: false
        schema:
          type: string
          format: date-time
      - name: end
        in: query
        required: false
        schema:
          type: string
          format: date-time
    responses:
      '200':
        description: Channel detail statistics returned
        content:
          application/json:
            schema:
              $ref: "../components/schemas/ChannelDetails.yaml"
      '404':
        $ref: "../components/responses/NotFound.yaml"
      '401':
        $ref: "../components/responses/Unauthorized.yaml"
      '500':
        $ref: "../components/responses/InternalServerError.yaml"

/stats/channels/{id}/events:
  get:
    summary: Retrieve real-time event counts for a channel
    description: |
      Returns real-time event tracking data for a specific channel within a time window.
      Events include listens, shares, follows, etc.
      Data is sourced from the `stats_track_event_channel` table.
      Results can be filtered by time range and aggregated by different intervals.
    tags:
      - Statistics
    security:
      - Auth0Bearer: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: start
        in: query
        required: true
        schema:
          type: string
          format: date-time
          description: Start of the time window (ISO 8601)
      - name: end
        in: query
        required: true
        schema:
          type: string
          format: date-time
          description: End of the time window (ISO 8601)
      - name: interval
        in: query
        required: false
        schema:
          type: string
          enum: [hour, day, week, month]
          default: day
          description: Time interval for aggregating events
    responses:
      '200':
        description: Channel event counts returned
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: "../components/schemas/StatsTrackEventChannel.yaml"
                meta:
                  type: object
                  properties:
                    total_events:
                      type: integer
                      description: Total number of events in the time window
                    start:
                      type: string
                      format: date-time
                    end:
                      type: string
                      format: date-time
      '404':
        $ref: "../components/responses/NotFound.yaml"
      '401':
        $ref: "../components/responses/Unauthorized.yaml"
      '500':
        $ref: "../components/responses/InternalServerError.yaml"

/stats/channels/export:
  get:
    summary: Export channel statistics data
    description: |
      Exports aggregated channel statistics in CSV or JSON format.
      Includes metrics like total listens, shares, follows, etc.
      Supports filtering by time range and aggregation intervals.
      
      This endpoint is useful for:
      - Analytics dashboards
      - Publisher reporting
      - Channel performance analysis
      - Trend identification
    tags:
      - Statistics
    security:
      - Auth0Bearer: []
    parameters:
      - name: format
        in: query
        required: true
        schema:
          type: string
          enum: [csv, json]
          default: csv
      - name: start_date
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Start date for stats aggregation
      - name: end_date
        in: query
        required: false
        schema:
          type: string
          format: date
        description: End date for stats aggregation
      - name: interval
        in: query
        required: false
        schema:
          type: string
          enum: [day, week, month]
          default: day
        description: Time interval for aggregation
    responses:
      '200':
        description: Channel statistics export file
        content:
          text/csv:
            schema:
              type: string
              description: CSV format (when format=csv)
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: "../components/schemas/StatsAggregatedChannel.yaml"
                meta:
                  type: object
                  properties:
                    total:
                      type: integer
                    filters:
                      type: object
                      properties:
                        interval:
                          type: string
                        date_range:
                          type: object
                          properties:
                            start:
                              type: string
                              format: date
                            end:
                              type: string
                              format: date
      '401':
        $ref: "../components/responses/Unauthorized.yaml"
      '500':
        $ref: "../components/responses/InternalServerError.yaml"

