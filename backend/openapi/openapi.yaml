openapi: 3.0.0
info:
  title: Podverse Admin API
  version: 1.0.0
  description: Admin API for Podverse podcast platform dashboard
servers:
  - url: http://localhost:8000/admin
security:
  - FirebaseAuth: []

paths:
  /auth/login:
    post:
      summary: Admin login (JWT exchange via Firebase)
      tags:
        - Auth
      requestBody:
        description: Admin login request
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  schemas:
    LoginRequest:
      $ref: "./components/schemas/auth/LoginRequest.yaml"
    LoginResponse:
      $ref: "./components/schemas/auth/LoginResponse.yaml"
  responses:
    Unauthorized:
      $ref: "./components/responses/Unauthorized.yaml"
