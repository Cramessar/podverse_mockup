openapi: 3.0.0
info:
  title: Podverse Admin API
  version: 1.0.0
  description: Admin API for Podverse podcast platform dashboard
servers:
  - description: Local development
    url: http://localhost:8000/admin
security:
  - Auth0Bearer: []
paths:
  /feeds:
    get:
      summary: Retrieve a list of RSS feeds
      description: |
        Returns a paginated list of RSS feeds including each feed's URL, status, and associated metadata.
        Supports optional search, limit, and offset parameters for pagination and filtering.
        Data is sourced from the `feed` table, joined with `feed_flag_status` for human-readable status labels.
      tags:
        - Feeds
      security:
        - Auth0Bearer: []
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of feeds returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Feed'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
  /feeds/{feed_id}:
    get:
      summary: Retrieve a feed by ID
      description: |
        Fetches complete feed metadata by `id`.

        This includes:
        - `url`: The RSS feed address
        - `feed_flag_status_id`: Links to `feed_flag_status` table (e.g. active, spam)
        - `is_parsing`: Timestamp set when feed is being parsed
        - `parsing_priority`: Integer from 0 to 5 used to schedule parsing frequency

        Optional joins with `channel` for UI display, but this route is scoped to the `feed` table.
      tags:
        - Feeds
      security:
        - Auth0Bearer: []
      parameters:
        - name: feed_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Feed details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feed'
        '404':
          $ref: '#/components/responses/NotFound'
  /feeds/{feed_id}/reparse:
    post:
      summary: Trigger RSS feed re-parse
      description: |
        This sets the `is_parsing` field on the `feed` table to true, indicating that the feed should be re-fetched and reprocessed.

        This is useful if a feed appears stuck or failed to parse previously.

        NOTE: Actual parsing happens asynchronously in a worker, not in response to this call. The `is_parsing` flag will be set back to false when processing completes.
      tags:
        - Feeds
      security:
        - Auth0Bearer: []
      parameters:
        - name: feed_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reparse triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Feed reparse has been scheduled.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /feeds/import:
    post:
      summary: Import feeds from OPML file
      description: |
        Accepts an OPML file upload containing RSS feed URLs.
        Extracts feed URLs from the OPML file and creates new feed entries in the system.

        The OPML file should follow standard OPML 2.0 format with <outline> elements containing xmlUrl attributes.
        Duplicate feeds (matching URLs) will be skipped.
      tags:
        - Feeds
      security:
        - Auth0Bearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: OPML file containing feed URLs
      responses:
        '200':
          description: Import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                    description: Number of feeds successfully imported
                  skipped:
                    type: integer
                    description: Number of feeds skipped (duplicates)
                  failed:
                    type: integer
                    description: Number of feeds that failed to import
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /feeds/export:
    get:
      summary: Export feeds as OPML or CSV metadata
      description: |
        Exports feed data in either OPML or CSV format:

        OPML format:
        - Standard OPML 2.0 specification
        - Contains <outline> elements with xmlUrl attributes
        - Includes basic feed metadata (title, url)

        CSV format includes comprehensive metadata:
        - Basic info: id, url, title
        - Parsing state: parsing_priority, is_parsing, last_parsed_at
        - Timestamps: created_at, updated_at
        - Status: feed_flag_status and related metadata

        This endpoint is useful for:
        - Importing feeds into other podcast systems (OPML)
        - Reviewing feed parsing states and errors (CSV)
        - Bulk feed management and auditing (CSV)
      tags:
        - Feeds
      security:
        - Auth0Bearer: []
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum:
              - opml
              - csv
            default: opml
          description: Export format (OPML or CSV)
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - error
              - all
            default: all
          description: Filter feeds by status
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search term to filter feeds by URL or metadata
      responses:
        '200':
          description: Feed data exported successfully
          content:
            application/xml:
              schema:
                type: string
                description: OPML format (when format=opml)
            text/csv:
              schema:
                type: string
                description: CSV format (when format=csv)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /feeds/bulk-update:
    post:
      summary: Bulk update feed properties
      description: |
        Updates multiple feeds' properties in a single operation.
        Can modify parsing priority, flag status, or other operational properties.
        Useful for batch operations like disabling multiple feeds or changing parsing schedules.
      tags:
        - Feeds
      security:
        - Auth0Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedBulkUpdate'
      responses:
        '200':
          description: Feeds updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                    description: Number of feeds successfully updated
                  skipped:
                    type: integer
                    description: Number of feeds skipped (not found)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /feeds/bulk-delete:
    post:
      summary: Delete multiple feeds in bulk
      description: |
        Deletes multiple feeds simultaneously.
        This is useful for batch operations like:
        - Removing inactive or broken feeds
        - Cleaning up spam feeds
        - Mass feed removal operations

        Note: This operation is irreversible.
      tags:
        - Feeds
      security:
        - Auth0Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedBulkDelete'
      responses:
        '200':
          description: Feeds deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: Number of feeds successfully deleted
                  skipped:
                    type: integer
                    description: Number of feeds skipped (not found)
                  reason:
                    type: string
                    description: Reason provided for deletion (for audit logs)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /channels:
    get:
      summary: Retrieve a list of channels
      description: |
        Returns a paginated list of channels with their basic metadata.
        Supports filtering by text-based search on `title`, and sorting by `id` or `title`.
        Primary table is `channel`.
        Related tables are :
        - `medium`: used to include the medium type (e.g. podcast, video) 
        - `feed`: used to show the associated RSS feed URL or status (optional).
      tags:
        - Channels
      security:
        - Auth0Bearer: []
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/search'
        - name: sort_by
          in: query
          schema:
            type: string
          description: |
            Field to sort results by. Supported fields: `id`, `title`. 
            Invalid values will gracefully fall back to `id` (default behavior).
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort order (ascending or descending).
      responses:
        '200':
          description: List of channels returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Channel'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: Total number of matching channels
                      limit:
                        type: integer
                        description: Limit applied to query
                      offset:
                        type: integer
                        description: Offset applied to query
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /channels/{id}:
    get:
      summary: Retrieve a channel by ID
      description: |
        Returns details for a specific channel.
        Includes associated relationships and metadata such as slug, podcast index ID, feed reference, and medium.
        Primary table is `channel`.
        Related tables are :
        - `feed`: provides the associated feed URL and parsing status
        - `medium`: provides the media type of the channel
        - `channel_category` + `category`: maps the channel to its categories
        - `stats_aggregated_channel`: optionally used to show precomputed statistics
      tags:
        - Channels
      security:
        - Auth0Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: The ID of the channel to retrieve
      responses:
        '200':
          description: Channel details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /channels/export:
    get:
      summary: Export channel data in CSV or JSON format
      description: |
        Exports channel data in CSV or JSON format. The export includes:

        - Basic channel info (id, title, slug, sortable_title, id_text)
        - Feed information (URL, status)
        - Medium type and name
        - Podcast metadata (podcast_index_id, podcast_guid, value flags)
        - Statistics (aggregated counts)
        - Timestamps (created_at, updated_at)

        This endpoint is useful for:
        - Analytics and reporting
        - Channel auditing and management
        - Data backup and migration
        - Integration with external systems

        The endpoint supports the same filtering and sorting options as the 
        main channels list endpoint for consistency.
        
        **Note**: OPML format is not supported for channel exports (only available for feeds).
      tags:
        - Channels
      security:
        - Auth0Bearer: []
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum:
              - csv
              - json
            default: csv
          description: Export format - CSV for spreadsheet compatibility or JSON for API integration
        - $ref: '#/components/parameters/search'
        - name: sort_by
          in: query
          schema:
            type: string
          description: |
            Field to sort results by. Supported fields: `id`, `title`. 
            Invalid values will gracefully fall back to `id` (default behavior).
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
          description: Sort order (ascending or descending)
        - name: max_rows
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50000
            default: 10000
          description: |
            Maximum number of rows to export (for performance). 
            Valid range: 1-50000. Values outside this range will fall back to 10000 (default).
      responses:
        '200':
          description: Channel data exported successfully
          content:
            text/csv:
              schema:
                type: string
                format: binary
                description: CSV file containing channel data with timestamped filename
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    slug:
                      type: string
                    feed_url:
                      type: string
                    medium_name:
                      type: string
                    stats_all_time_count:
                      type: integer
                  description: JSON array of channel objects with complete metadata
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=channels_export_20240101_120000.csv
              description: Specifies the filename for download (when format=csv)
        '400':
          description: Invalid request parameters or unsupported format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unsupported_format:
                  summary: Unsupported format requested
                  value:
                    error:
                      message: "OPML format is only supported for feeds. Use 'csv' or 'json' for other data types."
                      status_code: 400
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /categories:
    get:
      summary: List podcast categories
      description: |
        Returns all available podcast categories, including parent and child relationships.

        **Primary table:** `category`

        **Use case:** Used to classify channels into hierarchical genres based on Apple Podcasts-style taxonomy.
      tags:
        - Categories
      security:
        - Auth0Bearer: []
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /mediums:
    get:
      summary: List all media types
      description: |
        Returns the list of valid podcast medium values, such as podcast, video, blog, etc.

        **Primary table:** `medium`

        **Use case:** Channels reference this table to define their content type.
      tags:
        - Medium
      security:
        - Auth0Bearer: []
      responses:
        '200':
          description: List of mediums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Medium'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /stats/channels:
    get:
      summary: Retrieve aggregated channel statistics
      description: |
        Returns aggregated stats for channels such as total listens or views.
        Sorted by highest monthly count (month_current_count DESC).
        Supports optional filtering by time window (daily, weekly, monthly) and search by channel title or ID.
        Data is sourced from the `channel` and `stats_aggregated_channel` tables.
      tags:
        - Statistics
      security:
        - Auth0Bearer: []
      parameters:
        - $ref: '#/components/parameters/time_filter'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/search'
      responses:
        '200':
          description: Aggregated channel statistics returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatsChannel'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      limit:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /stats/channels/{id}:
    get:
      summary: Retrieve detail stats for a specific channel
      description: |
        Returns detailed statistics, such as total listens or views, and metadata for a specific channel.
        Includes basic channel info, aggregated stats, and raw event count within an optional time window.
        Data comes from `stats_aggregated_channel` and `channel` tables.
      tags:
        - Statistics
      security:
        - Auth0Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Channel detail statistics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /stats/channels/{id}/events:
    get:
      summary: Retrieve real-time event counts for a channel
      description: |
        Returns real-time event tracking data for a specific channel within a time window.
        Events include listens, shares, follows, etc.
        Data is sourced from the `stats_track_event_channel` table.
        Results can be filtered by time range and aggregated by different intervals.
      tags:
        - Statistics
      security:
        - Auth0Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
            description: Start of the time window (ISO 8601)
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
            description: End of the time window (ISO 8601)
        - name: interval
          in: query
          required: false
          schema:
            type: string
            enum:
              - hour
              - day
              - week
              - month
            default: day
            description: Time interval for aggregating events
      responses:
        '200':
          description: Channel event counts returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatsTrackEventChannel'
                  meta:
                    type: object
                    properties:
                      total_events:
                        type: integer
                        description: Total number of events in the time window
                      start:
                        type: string
                        format: date-time
                      end:
                        type: string
                        format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /stats/channels/export:
    get:
      summary: Export channel statistics data
      description: |
        Exports aggregated channel statistics in CSV or JSON format.
        Includes metrics like total listens, shares, follows, etc.
        Supports filtering by time range and aggregation intervals.

        This endpoint is useful for:
        - Analytics dashboards
        - Publisher reporting
        - Channel performance analysis
        - Trend identification
      tags:
        - Statistics
      security:
        - Auth0Bearer: []
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum:
              - csv
              - json
            default: csv
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date for stats aggregation
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date for stats aggregation
        - name: interval
          in: query
          required: false
          schema:
            type: string
            enum:
              - day
              - week
              - month
            default: day
          description: Time interval for aggregation
      responses:
        '200':
          description: Channel statistics export file
          content:
            text/csv:
              schema:
                type: string
                description: CSV format (when format=csv)
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatsAggregatedChannel'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      filters:
                        type: object
                        properties:
                          interval:
                            type: string
                          date_range:
                            type: object
                            properties:
                              start:
                                type: string
                                format: date
                              end:
                                type: string
                                format: date
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /stats/items:
    get:
      summary: Retrieve aggregated item (episode) statistics
      description: |
        Returns aggregated stats for items (podcast episodes).
        Sorted by highest monthly count (month_current_count DESC).
        Supports optional filtering by time window and search by item title or ID.
        Data is sourced from the `item`, `stats_aggregated_item` tables. 
      tags:
        - Statistics
      security:
        - Auth0Bearer: []
      parameters:
        - $ref: '#/components/parameters/time_filter'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/search'
      responses:
        '200':
          description: Aggregated item statistics returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatsItem'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      limit:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /stats/items/{id}:
    get:
      summary: Retrieve detail stats for a specific item
      description: |
        Returns detailed statistics and metadata for a specific item.
        Includes basic item info, aggregated stats, and raw event count within an optional time window.
        Data is sourced from the `item`, `stats_aggregated_item`, and `stats_track_event_item` tables.
      tags:
        - Statistics
      security:
        - Auth0Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Item detail statistics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /stats/items/{id}/events:
    get:
      summary: Retrieve real-time event counts for an item
      description: |
        Returns real-time event tracking data for a specific item (episode) within a time window.
        Events include listens, shares, bookmarks, etc.
        Data is sourced from the `stats_track_event_item` table.
        Results can be filtered by time range and aggregated by different intervals.
      tags:
        - Statistics
      security:
        - Auth0Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
            description: Start of the time window (ISO 8601)
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
            description: End of the time window (ISO 8601)
        - name: interval
          in: query
          required: false
          schema:
            type: string
            enum:
              - hour
              - day
              - week
              - month
            default: day
            description: Time interval for aggregating events
      responses:
        '200':
          description: Item event counts returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatsTrackEventItem'
                  meta:
                    type: object
                    properties:
                      total_events:
                        type: integer
                        description: Total number of events in the time window
                      start:
                        type: string
                        format: date-time
                      end:
                        type: string
                        format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /stats/items/export:
    get:
      summary: Export item statistics data
      description: |
        Exports aggregated item (episode) statistics in CSV or JSON format.
        Includes metrics like listens, shares, bookmarks, etc.
        Supports filtering by time range and aggregation intervals.

        This endpoint is useful for:
        - Episode performance analysis
        - Content strategy planning
        - Listener engagement tracking
        - Trend analysis
      tags:
        - Statistics
      security:
        - Auth0Bearer: []
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum:
              - csv
              - json
            default: csv
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date for stats aggregation
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date for stats aggregation
        - name: interval
          in: query
          required: false
          schema:
            type: string
            enum:
              - day
              - week
              - month
            default: day
          description: Time interval for aggregation
        - name: channel_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter items by channel ID
      responses:
        '200':
          description: Item statistics export file
          content:
            text/csv:
              schema:
                type: string
                description: CSV format (when format=csv)
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatsAggregatedItem'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      filters:
                        type: object
                        properties:
                          channel_id:
                            type: integer
                          interval:
                            type: string
                          date_range:
                            type: object
                            properties:
                              start:
                                type: string
                                format: date
                              end:
                                type: string
                                format: date
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /items:
    get:
      summary: List all items
      description: |
        Returns a paginated list of items (episodes) with optional filters such as
        channel ID and publish date range. Also supports search and sorting.

        **Primary table:** `item`

        **Related tables:**
        - `channel`: used to filter items by parent channel (`channel_id`)
        - `item_flag_status`: used to determine current flag/status of the item
        - `stats_aggregated_item`: optionally joined to provide aggregated stats like play/download count
      tags:
        - Items
      security:
        - Auth0Bearer: []
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/search'
        - name: channel_id
          in: query
          schema:
            type: integer
          description: Filter items by their parent channel's ID
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - pending-archive
              - archived
              - pending-delete
          description: Filter items by their flag status (`item_flag_status.status`)
        - name: published_after
          in: query
          schema:
            type: string
            format: date-time
          description: Filter items published after this date
        - name: published_before
          in: query
          schema:
            type: string
            format: date-time
          description: Filter items published before this date
        - name: sort_by
          in: query
          schema:
            type: string
            enum:
              - pub_date
              - title
              - id
          description: Field to sort results by (supports `pub_date`, `title`, or `id`)
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort order (ascending or descending)
      responses:
        '200':
          description: List of items returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: Total number of matching items
                      limit:
                        type: integer
                        description: Limit applied to query
                      offset:
                        type: integer
                        description: Offset applied to query
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /items/{id}:
    get:
      summary: Get item by ID
      description: |
        Retrieves a specific item (episode) by its ID.

        **Primary table:** `item`

        **Related tables:**
        - `channel`: provides information about the parent channel
        - `item_flag_status`: provides the current flag status
        - `stats_aggregated_item`: optionally used to return usage statistics for the item
      tags:
        - Items
      security:
        - Auth0Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Unique ID of the item
      responses:
        '200':
          description: Item found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /items/export:
    get:
      summary: Export episode-level data
      description: |
        Exports detailed episode (item) data including:
        - Basic info: id, title, pub_date, duration, guid
        - Relations: channel_id, feed_id
        - Content: description, language
        - Status: parsed_status and related metadata

        This endpoint is useful for:
        - Auditing episode data quality
        - QA checks on parsing completeness
        - Bulk episode management and analysis
      tags:
        - Items
      security:
        - Auth0Bearer: []
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum:
              - csv
              - json
            default: csv
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - archived
              - error
              - all
            default: active
          description: Filter items by their status
        - name: channel_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter items by channel ID
        - name: feed_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter items by feed ID
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter items by publication date (start)
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter items by publication date (end)
      responses:
        '200':
          description: Items export file
          content:
            text/csv:
              schema:
                type: string
                description: CSV format (when format=csv)
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      filters:
                        type: object
                        properties:
                          status:
                            type: string
                          channel_id:
                            type: integer
                          feed_id:
                            type: integer
                          date_range:
                            type: object
                            properties:
                              start:
                                type: string
                                format: date
                              end:
                                type: string
                                format: date
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    Auth0Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from Auth0
  parameters:
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
      description: Max number of results to return
    offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Number of results to skip for pagination
    search:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: Search term to filter results by name or title
    time_filter:
      name: time_filter
      in: query
      description: Filter results by time window (e.g., daily, weekly, monthly)
      required: false
      schema:
        type: string
        enum:
          - daily
          - weekly
          - monthly
  schemas:
    FeedFlagStatus:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier
          example: 1
        status:
          type: string
          enum:
            - active
            - always-parse
            - spam
            - pending-archive
            - archived
            - takedown
          description: Status assigned to the feed
          example: active
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
          example: '2024-01-01T10:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
          example: '2024-01-02T10:00:00Z'
    FeedLog:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the feed log entry
          example: 1
        feed_id:
          type: integer
          description: Foreign key reference to feed table
          example: 123
        message:
          type: string
          description: Log message content
          example: Feed parsed successfully
        created_at:
          type: string
          format: date-time
          description: Timestamp when log entry was created
          example: '2024-01-01T10:00:00Z'
      required:
        - id
        - feed_id
    Feed:
      type: object
      required:
        - id
        - url
        - feed_flag_status_id
      properties:
        id:
          type: integer
          description: Feed ID (primary key)
          example: 104
        feed_flag_status_id:
          type: integer
          description: Foreign key to feed_flag_status table (status type)
          example: 1
        url:
          type: string
          format: uri
          maxLength: 2083
          description: RSS feed URL
          example: https://example.com/rss.xml
        is_parsing:
          type: boolean
          nullable: true
          description: Whether the feed is currently being parsed
          default: false
          example: false
        parsing_priority:
          type: integer
          nullable: true
          minimum: 0
          maximum: 5
          description: Frequency tier for parsing; 0 = rarely, 5 = frequently
          default: 0
          example: 2
        last_parsed_file_hash:
          type: string
          maxLength: 64
          nullable: true
          description: Hash of last parsed feed XML used for change detection
          example: c4ca4238a0b923820dcc509a6f75849b
        container_id:
          type: string
          maxLength: 12
          nullable: true
          description: ID of the container instance that last parsed the feed
          example: ab12cd34ef56
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the feed was added
          example: '2025-06-17T22:00:00Z'
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the feed was last updated
          example: '2025-06-18T14:05:00Z'
        flag_status:
          $ref: '#/components/schemas/FeedFlagStatus'
        logs:
          type: array
          items:
            $ref: '#/components/schemas/FeedLog'
          description: Feed parsing logs
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: Invalid request parameters
        code:
          type: string
          description: Error code for programmatic handling
          example: INVALID_PARAMETERS
        details:
          type: object
          description: Additional error details
          additionalProperties: true
          example:
            field: rss_url
            reason: Invalid URL format
      required:
        - error
        - code
    FeedBulkUpdate:
      type: object
      description: Schema for bulk updating multiple feeds
      required:
        - feed_ids
        - updates
      properties:
        feed_ids:
          type: array
          description: List of feed IDs to update
          items:
            type: integer
        updates:
          type: object
          description: Fields to update for the selected feeds
          properties:
            feed_flag_status_id:
              type: integer
              description: ID of the feed flag status
            parsing_priority:
              type: integer
              description: Priority level for feed parsing (higher numbers = higher priority)
            is_parsing:
              type: boolean
              description: Whether the feed is currently being parsed
          minProperties: 1
    FeedBulkDelete:
      type: object
      description: Schema for bulk deleting multiple feeds
      required:
        - feed_ids
      properties:
        feed_ids:
          type: array
          description: List of feed IDs to delete
          items:
            type: integer
          minItems: 1
        force:
          type: boolean
          description: If true, force delete even if feeds have associated channels or items
          default: false
    Category:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the category
          example: 1
        parent_id:
          type: integer
          nullable: true
          description: ID of parent category for hierarchical structure
          example: null
        display_name:
          type: string
          maxLength: 255
          description: Display name for the category
          example: Arts
        slug:
          type: string
          maxLength: 255
          description: URL-friendly slug for the category
          example: arts
        mapping_key:
          type: string
          maxLength: 255
          description: Camel case version of the slug for API mapping
          example: arts
      required:
        - id
        - display_name
        - slug
        - mapping_key
    Medium:
      type: object
      properties:
        id:
          type: integer
          description: Unique ID for the medium type
          example: 3
        value:
          type: string
          description: |
            Content medium type. 
            Valid values include:
            - podcast
            - music
            - video
            - blog
            - audiobook
            - newsletter
            - publisher
            - course
            - mixed
            (and their 'L' variants, e.g., podcastL, musicL, etc.)
          example: podcast
      required:
        - id
        - value
    Channel:
      type: object
      required:
        - id
        - id_text
        - title
      properties:
        id:
          type: integer
          description: Unique numeric ID for the channel
          example: 201
        id_text:
          type: string
          maxLength: 64
          description: Public-facing short ID for URLs
          example: ch_8a3f91
        slug:
          type: string
          maxLength: 100
          nullable: true
          description: URL-friendly slug
          example: the-daily-news
        feed_id:
          type: integer
          nullable: true
          description: ID of the associated feed
          example: 104
        podcast_index_id:
          type: integer
          nullable: true
          description: External Podcast Index identifier
          example: 872361
        podcast_guid:
          type: string
          format: uuid
          nullable: true
          description: '`<podcast:guid>` from the RSS feed'
          example: 1e8f3d7c-7fc0-4b70-90e1-991ed05bc4c4
        title:
          type: string
          maxLength: 255
          description: Title of the podcast or media channel
          example: The Daily News Podcast
        sortable_title:
          type: string
          maxLength: 50
          nullable: true
          description: Lowercased, normalized version of title for sorting
          example: daily news podcast
        medium_id:
          type: integer
          nullable: true
          description: Foreign key to the `medium` table
          example: 2
        has_podcast_index_value:
          type: boolean
          description: Indicates if channel uses Podcast Index's value tag data
          example: false
        has_value_time_splits:
          type: boolean
          description: Indicates whether channel items use value time split logic
          example: true
        categories:
          type: array
          description: Categories associated with this channel
          items:
            $ref: '#/components/schemas/Category'
        medium:
          $ref: '#/components/schemas/Medium'
    StatsChannel:
      type: object
      properties:
        channel_id:
          type: integer
          description: Unique ID of the channel
        podcast_index_id:
          type: integer
          description: Podcast Index ID
        title:
          type: string
          description: Title of the podcast show
        total_listens:
          type: integer
          description: Total listens during the selected time period
        start_date:
          type: string
          format: date
          description: Start date of the aggregation window (ISO 8601)
        end_date:
          type: string
          format: date
          description: End date of the aggregation window (ISO 8601)
      required:
        - channel_id
        - podcast_index_id
        - title
        - total_listens
    ItemFlagStatus:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the item flag status
          example: 2
        status:
          type: string
          enum:
            - active
            - pending-archive
            - archived
            - pending-delete
          description: |
            Status assigned to an item to control lifecycle behavior.
            - `active`: Item is live and visible
            - `pending-archive`: Scheduled for archival
            - `archived`: No longer active but kept in the system
            - `pending-delete`: Marked for removal
          example: archived
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
          example: '2024-01-01T12:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
          example: '2024-01-05T09:30:00Z'
      required:
        - id
        - status
    StatsAggregatedItem:
      type: object
      required:
        - id
        - item_id
      properties:
        id:
          type: integer
          description: Unique identifier for the aggregated stats
          example: 1
        item_id:
          type: integer
          description: ID of the item these stats are for
          example: 42
        day_current_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for current day
          example: 150
        day_1_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for day 1
          example: 145
        day_2_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for day 2
          example: 140
        day_3_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for day 3
          example: 135
        day_4_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for day 4
          example: 130
        day_5_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for day 5
          example: 125
        day_6_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for day 6
          example: 120
        day_7_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for day 7
          example: 115
        day_8_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for day 8
          example: 110
        week_current_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for current week
          example: 1000
        week_1_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for week 1
          example: 950
        week_2_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for week 2
          example: 900
        week_3_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for week 3
          example: 850
        week_4_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for week 4
          example: 800
        month_current_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for current month
          example: 4000
        month_1_count:
          type: integer
          minimum: 0
          default: 0
          description: Event count for month 1
          example: 3800
        all_time_count:
          type: integer
          minimum: 0
          default: 0
          description: Total event count since tracking began
          example: 25000
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
          example: '2024-01-01T10:00:00Z'
    StatsTrackEventItem:
      type: object
      description: Schema for tracking item-level events
      required:
        - id
        - account_guid
        - item_id
        - created_at
        - event_type
      properties:
        id:
          type: integer
          description: Unique identifier for the event
          example: 1
        account_guid:
          type: string
          format: uuid
          description: UUID of the account that triggered the event
          example: 123e4567-e89b-12d3-a456-426614174000
        item_id:
          type: integer
          description: ID of the item this event is for
          example: 42
        created_at:
          type: string
          format: date-time
          description: When the event occurred
          example: '2024-01-15T10:30:00Z'
        event_type:
          type: string
          enum:
            - listen
            - view
            - share
            - download
            - favorite
            - unfavorite
          description: Type of event
          example: listen
        metadata:
          type: object
          description: Additional metadata about the event (implementation specific)
          additionalProperties: true
    Item:
      type: object
      required:
        - id
        - id_text
        - channel_id
        - title
        - item_flag_status_id
      properties:
        id:
          type: integer
          description: Unique identifier for the item
          example: 1
        id_text:
          type: string
          maxLength: 64
          description: Short identifier used in public-facing URLs
          example: ep_2a3f9c
        slug:
          type: string
          maxLength: 100
          nullable: true
          description: URL-friendly slug for the item
          example: episode-1-getting-started
        channel_id:
          type: integer
          description: ID of the channel this item belongs to
          example: 42
        guid:
          type: string
          maxLength: 2083
          nullable: true
          description: RSS `<guid>` of the item (either guid or guid_enclosure_url must be present)
          example: https://example.com/items/1
        guid_enclosure_url:
          type: string
          maxLength: 2083
          nullable: true
          description: Enclosure URL from RSS used as fallback if GUID is missing (either guid or guid_enclosure_url must be present)
          example: https://example.com/items/ep1.mp3
        pub_date:
          type: string
          format: date-time
          nullable: true
          description: Publication date of the item
          example: '2024-01-15T10:30:00Z'
        title:
          type: string
          maxLength: 255
          description: Title of the item (usually the episode title)
          example: 'Episode 1: Getting Started'
        item_flag_status_id:
          type: integer
          description: Foreign key to the item_flag_status table
          example: 1
        flag_status:
          $ref: '#/components/schemas/ItemFlagStatus'
        stats:
          $ref: '#/components/schemas/StatsAggregatedItem'
        events:
          type: array
          items:
            $ref: '#/components/schemas/StatsTrackEventItem'
          description: Item tracking events
    ChannelDetails:
      type: object
      properties:
        items:
          type: array
          description: List of items (episodes) associated with this channel
          items:
            $ref: '#/components/schemas/Item'
        stats:
          description: Aggregated statistics for the channel
          $ref: '#/components/schemas/StatsChannel'
        categories:
          type: array
          description: Categories assigned to this channel
          items:
            $ref: '#/components/schemas/Category'
        feed:
          description: Metadata from the feed this channel is linked to
          $ref: '#/components/schemas/Feed'
        medium:
          description: Medium details (e.g., podcast, video, blog)
          $ref: '#/components/schemas/Medium'
    StatsTrackEventChannel:
      type: object
      required:
        - id
        - channel_id
        - event_type
        - created_at
      properties:
        id:
          type: integer
          description: Unique identifier for the event
          example: 1001
        channel_id:
          type: integer
          description: ID of the channel this event is associated with
          example: 201
        account_guid:
          type: string
          format: uuid
          nullable: true
          description: GUID of the account that triggered the event (if authenticated)
          example: 1e8f3d7c-7fc0-4b70-90e1-991ed05bc4c4
        event_type:
          type: string
          enum:
            - listen
            - view
            - share
            - follow
            - unfollow
          description: Type of event that occurred
          example: listen
        created_at:
          type: string
          format: date-time
          description: Timestamp when the event occurred
          example: '2024-01-15T10:30:00Z'
        metadata:
          type: object
          description: Additional metadata about the event (implementation specific)
          additionalProperties: true
          example:
            duration: 300
            source: web_player
    StatsAggregatedChannel:
      type: object
      required:
        - id
        - channel_id
      properties:
        id:
          type: integer
          description: Unique identifier for aggregated channel stats
          example: 1
        channel_id:
          type: integer
          description: Foreign key reference to channel table
          example: 123
        day_current_count:
          type: integer
          description: Current day's aggregated count
          example: 150
          default: 0
        day_1_count:
          type: integer
          description: Previous day's count
          example: 120
          default: 0
        day_2_count:
