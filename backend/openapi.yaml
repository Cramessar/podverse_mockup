openapi: 3.0.0
info:
  title: Podverse Admin API
  version: 1.0.0
  description: Admin API for Podverse podcast platform dashboard
servers:
  - url: http://localhost:8000/admin
security:
  - FirebaseAuth: []

components:
  securitySchemes:
    FirebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user1@example.com
        join_date:
          type: string
          format: date
          example: "2025-05-01"
        listen_time:
          type: integer
          description: Total listen time in minutes
          example: 1234
    Podcast:
      type: object
      properties:
        id:
          type: integer
          example: 101
        title:
          type: string
          example: "Podverse Daily"
        publisher:
          type: string
          example: "Podverse Studios"
        episode_count:
          type: integer
          example: 125
        total_listens:
          type: integer
          example: 12345
    Episode:
      type: object
      properties:
        id:
          type: integer
          example: 1001
        title:
          type: string
          example: "Episode 1: Welcome"
        podcast_id:
          type: integer
          example: 101
        listen_count:
          type: integer
          example: 1000

paths:
  /users:
    get:
      summary: List users
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: active
          in: query
          schema:
            type: boolean
        - name: joined_after
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer

  /users/{user_id}:
    get:
      summary: Get user detail
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /podcasts:
    get:
      summary: List podcasts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: popular
          in: query
          schema:
            type: boolean
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of podcasts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Podcast"
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer

  /podcasts/{podcast_id}:
    get:
      summary: Podcast details
      parameters:
        - name: podcast_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Podcast detail with stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Podcast"

  /podcasts/{podcast_id}/episodes:
    get:
      summary: List episodes for podcast
      parameters:
        - name: podcast_id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of episodes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Episode"
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer

  /episodes/{episode_id}:
    get:
      summary: Episode detail
      parameters:
        - name: episode_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Episode detail with stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Episode"

  /stats/listening-trends:
    get:
      summary: Listening trends
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: podcast_id
          in: query
          schema:
            type: integer
        - name: episode_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Time series listening data
          content:
            application/json:
              schema:
                type: object
                properties:
                  dates:
                    type: array
                    items:
                      type: string
                      format: date
                  listens:
                    type: array
                    items:
                      type: integer

  /site-uptime:
    get:
      summary: Site uptime info
      responses:
        "200":
          description: Site uptime statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  uptime_days:
                    type: number
                  last_downtime:
                    type: string
                    format: date-time
                  downtime_duration_minutes:
                    type: integer
