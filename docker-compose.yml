version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: podverse-backend:latest
    container_name: podverse_backend
    ports:
      - "8000:5000"
    environment:
      - FLASK_APP=main.py
      - FLASK_ENV=development
      - DATABASE_URL=postgres://podverse:secretpassword@postgres:5432/podverse_db
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - podverse-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: podverse-frontend:latest
    container_name: podverse_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - podverse-network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: podverse
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: podverse_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - podverse-network

volumes:
  pgdata:

networks:
  podverse-network:
    driver: bridge
