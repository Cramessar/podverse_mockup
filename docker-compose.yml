version: "3.9"

services:
  database:
    build:
      context: .
      dockerfile: Dockerfile.database
    image: podverse-database:latest
    container_name: podverse_database
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - podverse-network

  redis:
    image: redis/redis-stack:latest
    container_name: podverse_redis
    ports:
      - "6380:6379"
    networks:
      - podverse-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: podverse-backend:latest
    container_name: podverse_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
      - ./backend/.env
    environment:
      FLASK_APP: main.py
      FLASK_ENV: ${FLASK_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_RESULT_BACKEND: ${REDIS_RESULT_BACKEND}
    volumes:
      - ./backend/scripts:/app/scripts
      - ./backend/app:/app/app
    depends_on:
      - database
      - redis
      - backend
      - celery
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/exports:/app/exports
    networks:
      - podverse-network

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: podverse-backend:latest
    container_name: podverse_celery
    entrypoint: ""  # override entrypoint.sh
    command: celery -A make_celery worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      FLASK_APP: main.py
      FLASK_ENV: ${FLASK_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_RESULT_BACKEND: ${REDIS_RESULT_BACKEND}
    depends_on:
      - database
      - redis
      - backend
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/exports:/app/exports
    networks:
      - podverse-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: podverse-backend:latest
    container_name: podverse_celery_beat
    entrypoint: ""  # override entrypoint.sh
    command: celery -A make_celery beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      FLASK_APP: main.py
      FLASK_ENV: ${FLASK_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_RESULT_BACKEND: ${REDIS_RESULT_BACKEND}
    depends_on:
      - database
      - redis
      - backend
      - celery
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/exports:/app/exports
    networks:
      - podverse-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: podverse_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    networks:
      - podverse-network

  ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
    image: podverse-ai:latest
    container_name: podverse_ai
    ports:
      - "5050:5050"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - backend
      - ai_db
    environment:
      FLASK_ENV: ${FLASK_ENV}
      BACKEND_URL: ${BACKEND_URL}
      DATABASE_URL: ${AI_DATABASE_URL}
      PYTHONPATH: ${PYTHONPATH}
      PODVERSE_BACKEND_PATH: ${PODVERSE_BACKEND_PATH}
    networks:
      - podverse-network

  ai_db:
    image: postgres:15
    container_name: podverse_ai_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${AI_DB_USER}
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD}
      POSTGRES_DB: ${AI_DB_NAME}
    volumes:
      - ai_pgdata:/var/lib/postgresql/data
      - ./ai/db/db_init.sql:/docker-entrypoint-initdb.d/db_init.sql
    ports:
      - "5433:5432"
    networks:
      - podverse-network

  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ${OLLAMA_MODEL_PATH:-./.ollama}:/root/.ollama
    ports:
      - "11435:11434"
    restart: always
    networks:
      - podverse-network

volumes:
  pgdata:
  ai_pgdata:

networks:
  podverse-network:
    driver: bridge
