version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: podverse-backend:latest
    container_name: podverse_backend
    ports:
      - "8000:5000"
    environment:
      - FLASK_APP=main.py
      - FLASK_ENV=development
    volumes:
      - ./backend:/app
    networks:
      - podverse-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: podverse-frontend:latest
    container_name: podverse_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - podverse-network

networks:
  podverse-network:
    driver: bridge
